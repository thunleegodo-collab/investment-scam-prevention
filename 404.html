<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | 投資詐欺防止.jp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #f7fafc;
      color: #2d3748;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      color: #e53e3e;
      line-height: 1;
      margin-bottom: .5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a365d;
      margin-bottom: 1rem;
    }
    p {
      font-size: .95rem;
      color: #718096;
      margin-bottom: 2rem;
      max-width: 480px;
    }
    .links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      display: inline-block;
      padding: .6rem 1.5rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .btn-primary {
      background: #1a365d;
      color: #fff;
    }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-secondary {
      background: #fff;
      color: #1a365d;
      border: 1.5px solid #e2e8f0;
    }
    .btn-secondary:hover { border-color: #2b6cb0; }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは移動または削除された可能性があります。URLをご確認の上、以下のリンクからお進みください。</p>
  <div class="links">
    <a href="index.html" class="btn-primary">トップページへ</a>
    <a href="checker.html" class="btn-secondary">業者チェッカー</a>
    <a href="consultation.html" class="btn-secondary">有料相談</a>
  </div>

</html>
